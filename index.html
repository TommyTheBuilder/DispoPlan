<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DispoPlan – Wochenboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Disposition · <span id="currentWeekLabel">KW</span></h1>
          <p class="muted">Desktop-First Wochenplanung für Touren</p>
        </div>
        <div class="topbar-actions">
          <a class="btn btn-ghost" href="db.html">Datenbank</a>
          <a class="btn btn-ghost" href="admin.html">Admin</a>
          <button id="prevWeekBtn" class="btn btn-ghost">◀ Vorwoche</button>
          <button id="nextWeekBtn" class="btn btn-ghost">Nächste Woche ▶</button>
          <button id="newTourBtn" class="btn btn-primary">+ Neue Tour</button>
        </div>
      </header>

      <section class="toolbar">
        <label>
          Suche
          <input id="searchInput" type="search" placeholder="Unternehmer / Kennzeichen / Tour" />
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="all">Alle</option>
            <option value="planned">Geplant</option>
            <option value="problem">Problem</option>
            <option value="sent">Geschickt</option>
          </select>
        </label>
        <label>
          Unternehmer
          <select id="entrepreneurFilter">
            <option value="all">Alle</option>
          </select>
        </label>
        <label>
          Abteilung
          <select id="departmentFilter"></select>
        </label>
      </section>

      <section class="stats" id="stats"></section>

      <main class="board-wrap">
        <div class="board" id="board"></div>
      </main>
    </div>

    <dialog id="tourDialog">
      <form id="tourForm" method="dialog" class="dialog-form">
        <h3>Tour anlegen</h3>
        <label>Titel <input name="title" required /></label>
        <label>Abteilung <select name="departmentId" id="tourDepartment" required></select></label>
        <label>Unternehmer <select name="entrepreneurId" required id="tourEntrepreneur"></select></label>
        <div class="split-2">
          <label>Von Datum <input name="fromDate" type="date" required /></label>
          <label>Bis Datum <input name="toDate" type="date" required /></label>
        </div>
        <div class="split-2">
          <label>Beladestelle (z. B. D-80 München) <input name="loadLocation" required /></label>
          <label>Entladestelle (z. B. D-70 Stuttgart) <input name="unloadLocation" required /></label>
        </div>
        <label>Status
          <select name="status">
            <option value="planned">Geplant</option>
            <option value="problem">Problem</option>
            <option value="sent">Geschickt</option>
          </select>
        </label>
        <label>Notiz <textarea name="notes" placeholder="Freie Beschreibung"></textarea></label>
        <label class="check-row"><input name="customerStatusRequired" type="checkbox" /> Kundenstatus erforderlich</label>
        <menu>
          <button type="button" class="btn" id="cancelTourDialog">Abbrechen</button>
          <button class="btn btn-primary" value="default">Speichern</button>
        </menu>
      </form>
    </dialog>

    <dialog id="tourStatusDialog">
      <form id="tourStatusForm" method="dialog" class="dialog-form">
        <h3 id="tourStatusTitle">Tour bearbeiten</h3>
        <label>Status
          <select name="status" id="editTourStatus">
            <option value="planned">Geplant</option>
            <option value="problem">Problem</option>
            <option value="sent">Geschickt</option>
          </select>
        </label>
        <div class="split-2">
          <label>Von Datum <input type="date" name="fromDate" id="editFromDate" required /></label>
          <label>Bis Datum <input type="date" name="toDate" id="editToDate" required /></label>
        </div>
        <div class="split-2">
          <label>Beladestelle <input type="text" name="loadLocation" id="editLoadLocation" required /></label>
          <label>Entladestelle <input type="text" name="unloadLocation" id="editUnloadLocation" required /></label>
        </div>
        <label>Ankunft Lade-/Entladestelle
          <input type="time" name="arrivalTime" id="editArrivalTime" />
        </label>
        <label class="check-row"><input type="checkbox" name="customerStatusRequired" id="editCustomerStatusRequired" /> Kundenstatus erforderlich</label>
        <label class="check-row"><input type="checkbox" name="customerStatusDone" id="editCustomerStatusDone" /> Kundenstatus gemeldet</label>
        <menu>
          <button type="button" class="btn" id="deleteTourBtn">Tour löschen</button>
          <button type="button" class="btn" id="cancelTourStatusDialog">Abbrechen</button>
          <button class="btn btn-primary" value="default">Speichern</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
